name: Synapse Manager

on:
  push:
    branches: [main]
    paths:
      - "synapse_manager/**"
  pull_request:
    paths:
      - "synapse_manager/**"

jobs:
  format:
    name: Format + Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: synapse_manager/src-tauri

      - name: Rust fmt check
        working-directory: synapse_manager/src-tauri
        run: cargo fmt --all -- --check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: synapse_manager
        run: npm ci

      - name: Prettier check
        working-directory: synapse_manager
        run: npx prettier . --check

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            pkg-config \
            build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: synapse_manager/src-tauri

      - name: Build Rust backend
        working-directory: synapse_manager/src-tauri
        run: cargo build --release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: synapse_manager/package-lock.json

      - name: Install frontend deps
        working-directory: synapse_manager
        run: npm ci

      - name: Build frontend
        working-directory: synapse_manager
        run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: format

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: synapse_manager/src-tauri

      - name: Run Rust tests
        working-directory: synapse_manager/src-tauri
        run: cargo test --all --verbose
