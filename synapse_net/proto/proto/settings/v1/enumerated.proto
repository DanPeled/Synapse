syntax = "proto3";

package proto.settings.v1;

import "proto/settings/v1/value.proto";

message EnumeratedOptionProto {
  string key = 1;
  SettingValueProto value = 2;
}

// Constraint that limits a setting to a predefined list of possible values
message EnumeratedConstraintProto {
  // List of allowed option values for the setting
  repeated EnumeratedOptionProto options = 1;
}
